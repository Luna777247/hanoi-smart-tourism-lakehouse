# Tùy chọn: gắn Docker socket để BashOperator trong Airflow (worker/scheduler) có thể
# chạy `docker exec spark-master ...` (DAG hanoi_full_pipeline).
#
# Chạy:
#   docker compose -f docker-compose.yml -f docker-compose.airflow-docker-exec.yml up -d
#
# Linux: nếu lỗi permission trên /var/run/docker.sock, trong docker-compose.yml có thể
# thêm vào airflow-worker (ví dụ, sau group_add cần GID đúng với host):
#   group_add:
#     - "${DOCKER_GID}"
# và đặt DOCKER_GID trong .env (output của: getent group docker | cut -d: -f3)

services:
  airflow-worker:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  airflow-scheduler:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
