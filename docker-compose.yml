# File: docker-compose.yml (root)

# ─── Shared env & extensions (Airflow 3) ──────────────
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: infra/airflow/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow_db
    # AIRFLOW__CELERY__RESULT_BACKEND: ... (Not needed for LocalExecutor)
    # AIRFLOW__CELERY__BROKER_URL: ... (Not needed for LocalExecutor)
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # _PIP_ADDITIONAL_DEPENDENCIES: ... (moved to Dockerfile)
    # Airflow 3 Auth
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'admin:ADMIN'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    AIRFLOW__CORE__SECRET_KEY: '89a~v7^j#2!0m*z&5p@q4y$6x9' # Chuỗi bảo mật quan trọng
    AIRFLOW__API__SERVER_URL: http://airflow-api-server:8080
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://lakehouse-airflow-api:8080/execution/
    PYTHONPATH: /opt/airflow/dags
    VAULT_ADDR: http://vault:8200
    VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID}
    SERPAPI_KEY: ${SERPAPI_KEY}
    AIRFLOW__OPENLINEAGE__NAMESPACE: 'hanoi-tourism-lakehouse'
    AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://openmetadata-server:8585/api/v1/events"}'
    AIRFLOW__OPENLINEAGE__DISABLED: 'true'
    AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: 180
    # Email alerts configuration
    AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
    AIRFLOW__SMTP__SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
    AIRFLOW__SMTP__SMTP_PORT: ${SMTP_PORT:-587}
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_USER:-}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_MAIL_FROM:-noreply@tourism-lakehouse.local}
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    MINIO_ENDPOINT: http://minio:9000
    REDIS_HOST: redis
    PATH: /home/airflow/.local/bin:/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    RAPID_API_KEY1: ${RAPID_API_KEY1}
    RAPID_API_KEY2: ${RAPID_API_KEY2}
    RAPID_API_KEY3: ${RAPID_API_KEY3}
    RAPID_API_KEY4: ${RAPID_API_KEY4}
    RAPID_API_KEY5: ${RAPID_API_KEY5}
    RAPID_API_KEY6: ${RAPID_API_KEY6}
    RAPID_API_KEY7: ${RAPID_API_KEY7}
  volumes:
    - ./infra/airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - ./dbt_project:/opt/airflow/dbt_project
    - ./data:/opt/airflow/data
    - ./infra/airflow/metrics_exporter.py:/opt/airflow/metrics_exporter.py
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    redis: { condition: service_healthy }
    postgres: { condition: service_healthy }
  networks: [ lakehouse ]

services:
  # ─── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-U', '${POSTGRES_USER}' ]
      interval: 10s
      retries: 5
      start_period: 5s
    networks: [ lakehouse ]
    ports: [ '5432:5432' ]

  # ─── Redis (Celery broker) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lakehouse-redis
    command: redis-server --save ""
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      retries: 5
    networks: [ lakehouse ]

  # ─── MinIO Object Storage ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports: [ '9000:9000', '9001:9001' ]
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live' ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks: [ lakehouse ]

  # ─── MinIO Init (one-shot) ───────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: /bin/sh
    command: /infra/minio/init-buckets.sh
    volumes:
      - ./infra/minio:/infra/minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks: [ lakehouse ]
    restart: on-failure

  # ─── Keycloak (Identity Provider) ───────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: lakehouse-keycloak
    command: start-dev
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [ lakehouse ]
    restart: always

  # ─── HashiCorp Vault ────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: lakehouse-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add: [ IPC_LOCK ]
    volumes:
      - ./infra/vault:/vault/config
      - vault-data:/vault/data
    ports: [ '8200:8200' ]
    command: server -dev
    networks: [ lakehouse ]
  airflow-api-server:
    <<: *airflow-common
    container_name: lakehouse-airflow-api
    command: airflow api-server --host 0.0.0.0
    ports: [ '8080:8080' ]
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/" ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: lakehouse-airflow-scheduler
    command: airflow scheduler
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$$HOSTNAME"' ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-dag-processor:
    <<: *airflow-common
    container_name: lakehouse-airflow-processor
    command: airflow dag-processor

  # Airflow Worker removed as LocalExecutor is being used

  airflow-triggerer:
    <<: *airflow-common
    container_name: lakehouse-airflow-triggerer
    command: airflow triggerer
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$$HOSTNAME"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Flower (Celery Monitoring UI) ───────────────────
  airflow-flower:
    <<: *airflow-common
    container_name: lakehouse-airflow-flower
    command: bash -c "pip install prometheus-client && celery --broker=redis://redis:6379/0 flower"
    ports: [ '5555:5555' ]
    healthcheck:
      test: [ 'CMD', 'curl', '--fail', 'http://localhost:5555/' ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis
    networks: [ lakehouse ]

  # ─── Airflow Metrics Exporter ────────────────────────
  airflow-metrics:
    <<: *airflow-common
    container_name: lakehouse-airflow-metrics
    entrypoint: python3
    command: /opt/airflow/metrics_exporter.py
    ports: [ '8001:8000' ]
    volumes:
      - ./infra/airflow/metrics_exporter.py:/opt/airflow/metrics_exporter.py
      - ./infra/airflow/run_metrics.sh:/opt/airflow/run_metrics.sh
    networks: [ lakehouse ]

  airflow-init:
    <<: *airflow-common
    container_name: lakehouse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate"
    restart: 'no'

  # ─── Apache Spark ────────────────────────────────────
  spark-master:
    image: spark:3.5.0
    container_name: lakehouse-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MODE=master
    volumes:
      - ./infra/spark/conf:/opt/bitnami/spark/conf
      - ./infra/spark/jobs:/opt/spark-jobs
      - ./infra/spark/jars:/opt/spark-jars
    ports: [ '7077:7077', '8090:8080' ]
    networks: [ lakehouse ]

  spark-worker:
    image: spark:3.5.0
    container_name: lakehouse-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_MODE=worker
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./infra/spark/conf:/opt/bitnami/spark/conf
      - ./infra/spark/jobs:/opt/spark-jobs
      - ./infra/spark/jars:/opt/spark-jars
    depends_on: [ spark-master ]
    networks: [ lakehouse ]

  # ─── Trino Query Engine ──────────────────────────────
  trino:
    image: trinodb/trino:435
    container_name: lakehouse-trino
    volumes:
      - ./infra/trino/etc:/etc/trino
    ports: [ '8888:8080' ]
    networks: [ lakehouse ]

  # ─── Apache Superset ─────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: lakehouse-superset
    user: "root"
    command: >
      sh -c "pip install trino && /usr/bin/run-server.sh"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/superset
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USER}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      ADMIN_EMAIL: admin@lakehouse.com
    volumes:
      - superset-home:/app/superset_home
      - ./infra/superset/dashboards:/app/dashboards
    ports: [ '8088:8088' ]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [ lakehouse ]

  # ─── OpenMetadata Dependencies ───────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: lakehouse-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    networks: [ lakehouse ]
    ports: [ '9200:9200' ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── OpenMetadata Init (one-shot) ────────────────────
  openmetadata-init:
    image: docker.getcollate.io/openmetadata/server:1.12.0
    container_name: lakehouse-openmetadata-init
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD}
      OM_DATABASE: openmetadata_db
    entrypoint: [ "/opt/openmetadata/bootstrap/openmetadata-ops.sh" ]
    command: [ "migrate" ]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [ lakehouse ]
    restart: on-failure

  # ─── OpenMetadata Server ─────────────────────────────
  openmetadata-server:
    image: docker.getcollate.io/openmetadata/server:1.12.0
    container_name: lakehouse-openmetadata
    environment:
      SERVER_PORT: 8585
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_USER_PASSWORD: ${POSTGRES_PASSWORD}
      OM_DATABASE: openmetadata_db
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://ingestion:8080
      PIPELINE_SERVICE_CLIENT_HOST_IP: ${PIPELINE_SERVICE_CLIENT_HOST_IP:-}
    ports: [ '8585:8585' ]
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      openmetadata-init: { condition: service_completed_successfully }
    networks: [ lakehouse ]

  # ─── OpenMetadata Ingestion (Airflow UI) ──────────────
  ingestion:
    image: docker.getcollate.io/openmetadata/ingestion:1.12.0
    container_name: lakehouse-openmetadata-ingestion
    entrypoint: /bin/sh
    command: -c "airflow db migrate && airflow scheduler"
    environment:
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      DB_HOST: postgres
      DB_PORT: 5432
      AIRFLOW_DB: airflow_metadata_db
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEME: postgresql+psycopg2
    ports: [ '8070:8080' ] # Chạy port 8070 để không bị trùng với Airflow chính (8080/8085)
    depends_on:
      postgres: { condition: service_healthy }
      openmetadata-server: { condition: service_started }
    networks: [ lakehouse ]

  # ─── Airflow Log Rotation ──────────────────────────
  airflow-logrotate:
    image: alpine:latest
    container_name: lakehouse-airflow-logrotate
    command: sh -c "while true; do sleep 86400; logrotate /etc/logrotate.d/airflow; done"
    volumes:
      - ./infra/airflow/logrotate.conf:/etc/logrotate.d/airflow
      - airflow-logs:/opt/airflow/logs
    networks: [ lakehouse ]
  backend:
    build: { context: ./apps/backend }
    container_name: lakehouse-backend
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID}
      AIRFLOW_API_URL: http://airflow-webserver:8080
      TRINO_HOST: trino
      TRINO_PORT: 8080
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports: [ '8000:8000' ]
    depends_on: [ vault, postgres ]
    networks: [ lakehouse ]

  frontend:
    build: { context: ./apps/frontend }
    container_name: lakehouse-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: [ '3000:3000' ]
    depends_on: [ backend ]
    networks: [ lakehouse ]

# ─── Volumes & Networks ──────────────────────────────
volumes:
  postgres-data:
  minio-data:
  vault-data:
  airflow-logs:
  airflow-plugins:
  superset-home:


networks:
  lakehouse:
    driver: bridge
