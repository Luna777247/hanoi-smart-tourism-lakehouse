      DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow_pass}
      DB_PROPERTIES: ${AIRFLOW_DB_PROPERTIES:-}
    entrypoint: /bin/bash
    command:
      - "/opt/airflow/ingestion_dependency.sh"
    expose:
      - 8080
    ports:
      - "${AIRFLOW_UI_PORT:-8087}:8080"
    networks:
      - default
    volumes:
      - ingestion-volume-dag-airflow:/opt/airflow/dag_generated_configs
      - ingestion-volume-dags:/opt/airflow/dags
      - ingestion-volume-tmp:/tmp
      - ./infra/openmetadata/ingestion/configs:/app/ingestion/configs:ro
      - ./infra/openmetadata/ingestion/logs:/app/ingestion/logs
      - ./infra/openmetadata/ingestion/ingestion_dependency.sh:/opt/airflow/ingestion_dependency.sh
    # env_file:
    #   - ./infra/openmetadata/ingestion/.env
    profiles: [openmetadata]

