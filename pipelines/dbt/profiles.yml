# ~/.dbt/profiles.yml
# Connects dbt to Trino (port 8090, remapped from anh Vương's docker-compose)
#
# Usage:
#   cd dbt && dbt debug          # test connection
#   dbt run --select gold        # run all gold models
#   dbt test --select gold       # run all gold tests
#   dbt run --vars '{"overcrowding_review_growth_threshold": 0.4}'

hanoi_tourism:
  target: dev
  outputs:
    dev:
      type: trino
      method: none           # no auth for local dev
      host: localhost
      port: 8080             # host port maps to trino:8080 (docker-compose)
      database: iceberg      # Trino catalog name
      schema: gold           # default schema; models override via config()
      threads: 4
      http_scheme: http

    # Production profile (adjust host/port for K8s Trino)
    prod:
      type: trino
      method: none
      host: trino.internal
      port: 8080
      database: iceberg
      schema: gold
      threads: 8
      http_scheme: http
