# Airflow Log Rotation Configuration
# This file configures log rotation for Airflow logs

/opt/airflow/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 644 airflow airflow
    postrotate
        # Reload Airflow processes after log rotation
        if [ -f /opt/airflow/airflow-webserver.pid ]; then
            kill -HUP $(cat /opt/airflow/airflow-webserver.pid) || true
        fi
        if [ -f /opt/airflow/airflow-scheduler.pid ]; then
            kill -HUP $(cat /opt/airflow/airflow-scheduler.pid) || true
        fi
    endscript
}

/opt/airflow/logs/**/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 644 airflow airflow
}