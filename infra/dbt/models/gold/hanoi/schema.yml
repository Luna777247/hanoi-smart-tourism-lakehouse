version: 2

models:
  - name: gold_attractions_summary
    description: >
      One row per attraction – latest snapshot enriched with 30-day trend metrics.
      Primary source for KPI cards, top-N charts, and map visualization in Superset.
    columns:
      - name: attraction_sk
        description: "Surrogate key from dim_attraction"
        tests: [unique, not_null]
      - name: place_id
        description: "Google Place ID (natural key)"
        tests: [unique, not_null]
      - name: name
        tests: [not_null]
      - name: district
        tests: [not_null]
      - name: lat
        tests: [not_null]
      - name: lng
        tests: [not_null]
      - name: current_rating
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 5
      - name: current_reviews
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

  - name: gold_district_performance
    description: >
      District-level KPIs aggregated from the latest daily snapshot.
      Powers district bar and pie charts in Superset.
    columns:
      - name: district
        tests: [unique, not_null]
      - name: attraction_count
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
      - name: avg_rating
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 5

  - name: gold_rating_trend
    description: >
      Weekly average rating and review volume per district.
      Powers Superset line chart for trend analysis.
    columns:
      - name: week_start
        tests: [not_null]
      - name: district
        tests: [not_null]
      - name: avg_rating
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 5

  - name: gold_overcrowding_alert
    description: >
      Rule-based overcrowding risk classification per attraction.
      risk_level ∈ {HIGH, MEDIUM, WATCH, NORMAL}.
      Powers Superset alert table with colour-coded risk badges.
    columns:
      - name: place_id
        tests: [unique, not_null]
      - name: risk_level
        tests:
          - not_null
          - accepted_values:
              values: ["HIGH", "MEDIUM", "WATCH", "NORMAL"]
      - name: risk_score
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 3
