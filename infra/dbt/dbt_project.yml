name: hanoi_tourism
version: "1.0.0"
config-version: 2

profile: hanoi_tourism  # maps to ~/.dbt/profiles.yml

model-paths:     ["models"]
test-paths:      ["tests"]
snapshot-paths:  ["snapshots"]
analysis-paths:  ["analyses"]
macro-paths:     ["macros"]

target-path:     "target"
clean-targets:   ["target", "dbt_packages"]

# ─── Model defaults ───────────────────────────────────────────────────────────
models:
  hanoi_tourism:
    +materialized: table
    +file_format:  iceberg           # all models use Iceberg format
    +location_root: "s3a://iceberg/warehouse"

    bronze:
      +schema: bronze
      +materialized: view            # bronze models are views over raw Iceberg tables

    silver:
      +schema: silver
      +materialized: table

    gold:
      +schema: gold
      +materialized: table
      +post-hook:
        - "ALTER TABLE {{ this }} EXECUTE optimize"

# ─── Tests ───────────────────────────────────────────────────────────────────
tests:
  hanoi_tourism:
    +severity: warn   # warn, not error, so CI doesn't block on data issues

vars:
  # Override in production runs: dbt run --vars '{"overcrowding_review_growth_threshold": 0.4}'
  overcrowding_review_growth_threshold: 0.3    # 30% week-over-week review growth
  overcrowding_min_rating: 4.3                  # popular enough to attract crowds
  overcrowding_min_reviews: 500                 # enough volume to be significant
  lookback_days: 30                             # trend window
