# File: infra/spark/conf/spark-defaults.conf
 
# ── Iceberg Support ──────────────────────────────────────────
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.iceberg=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type=rest
spark.sql.catalog.iceberg.uri=http://trino:8080
spark.sql.catalog.iceberg.warehouse=s3a://tourism-silver/
 
# ── MinIO S3 Config ──────────────────────────────────────────
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=${MINIO_ROOT_USER}
spark.hadoop.fs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
 
# ── OpenLineage Spark Listener ───────────────────────────────
spark.extraListeners=io.openlineage.spark.agent.OpenLineageSparkListener
spark.openlineage.transport.type=http
spark.openlineage.transport.url=http://openmetadata-server:8080
spark.openlineage.transport.endpoint=/api/v1/lineage
spark.openlineage.namespace=hanoi-tourism-lakehouse
 
# ── Performance ──────────────────────────────────────────────
spark.executor.memory=2g
spark.driver.memory=1g
spark.executor.cores=2
spark.dynamicAllocation.enabled=false
